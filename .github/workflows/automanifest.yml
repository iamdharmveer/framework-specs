name: auto-manifest
on:
  push:
    branches: [ main ]
permissions:
  contents: write   # allow committing the regenerated manifest back to main
jobs:
  regen:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.11" }

      - name: Regenerate MANIFEST.json from current files
        run: python3 gen_manifest.py

      - name: Commit manifest if it changed
        run: |
          if ! git diff --quiet MANIFEST.json; then
            git config user.name  "framework-bot"
            git config user.email "actions@users.noreply.github.com"
            git add MANIFEST.json
            git commit -m "auto: regenerate MANIFEST.json"
            git push
            echo "MANIFEST.json regenerated and committed."
          else
            echo "MANIFEST.json already up to date."
          fi

      - name: Verify the whole framework passes the gate
        run: python3 bootstrap.py
